<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F4F5F8">
<title>Sharpen — MYP Study Dashboard</title>
<script>try{var _t=localStorage.getItem('sharpen.theme');if(_t)document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sharpen">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F5F8;
    --surface:#FFFFFF;
    --surface-sunken:#EDEEF3;
    --ink:#171B24;
    --ink-soft:#666C7A;
    --ink-faint:#9297A3;
    --line:#E4E5EC;
    --math:#5451E0;
    --math-soft:#EDECFC;
    --sci:#B5651D;
    --sci-soft:#FBEDDD;
    --good:#1F9D63;
    --good-soft:#E4F6EC;
    --bad:#D5473A;
    --bad-soft:#FCEAE8;
    --radius-lg:18px;
    --radius-md:12px;
    --shadow:0 1px 2px rgba(23,27,36,0.04), 0 8px 24px rgba(23,27,36,0.06);
    --on-ink:#FFFFFF;
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --bg:#0E1014;
    --surface:#171A21;
    --surface-sunken:#20242E;
    --ink:#F1F2F5;
    --ink-soft:#A2A8B6;
    --ink-faint:#6C7280;
    --line:#2A2F3A;
    --math:#908DFF;
    --math-soft:#26263F;
    --sci:#E3945C;
    --sci-soft:#37281B;
    --good:#4FCB90;
    --good-soft:#183021;
    --bad:#F0705F;
    --bad-soft:#371D1A;
    --on-ink:#0E1014;
    --shadow:0 1px 2px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.45);
    color-scheme:dark;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#0E1014;
      --surface:#171A21;
      --surface-sunken:#20242E;
      --ink:#F1F2F5;
      --ink-soft:#A2A8B6;
      --ink-faint:#6C7280;
      --line:#2A2F3A;
      --math:#908DFF;
      --math-soft:#26263F;
      --sci:#E3945C;
      --sci-soft:#37281B;
      --good:#4FCB90;
      --good-soft:#183021;
      --bad:#F0705F;
      --bad-soft:#371D1A;
      --on-ink:#0E1014;
      --shadow:0 1px 2px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.45);
      color-scheme:dark;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
  /* margin:auto centers the app vertically when it's shorter than the screen,
     and safely collapses (no clipping, still scrollable) when content is tall. */
  #app{width:100%;max-width:820px;margin:auto;padding:36px 28px calc(60px + env(safe-area-inset-bottom));}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:30px;height:30px;border-radius:8px;background:url('icon.svg') center/cover no-repeat;flex-shrink:0;}
  .brand-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;letter-spacing:-0.01em;}
  .brand-tag{font-size:12px;color:var(--ink-faint);margin-top:-2px;}

  .top-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .streak-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);white-space:nowrap;}
  .streak-chip .flame{font-size:14px;}
  .streak-chip.cold{color:var(--ink-faint);}
  .theme-toggle{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1.5px solid var(--line);border-radius:999px;font-size:15px;cursor:pointer;box-shadow:var(--shadow);line-height:1;padding:0;transition:transform .12s ease;}
  .theme-toggle:hover{transform:translateY(-1px);}

  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .stat-card{background:var(--surface);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);cursor:pointer;border:1.5px solid transparent;transition:border-color .15s ease, transform .15s ease;}
  .stat-card:hover{transform:translateY(-1px);}
  .stat-card.active.math{border-color:var(--math);}
  .stat-card.active.sci{border-color:var(--sci);}
  .stat-inner{display:flex;align-items:center;gap:16px;}
  .stat-text{flex:1;min-width:0;}
  .stat-label{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:3px;}
  .stat-value{font-size:12.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
  .stat-value b{color:var(--ink);font-weight:600;}
  .stat-sub{font-size:11.5px;color:var(--ink-faint);margin-top:2px;font-variant-numeric:tabular-nums;}

  .mode-row{display:flex;gap:8px;background:var(--surface-sunken);padding:5px;border-radius:var(--radius-md);margin-bottom:8px;}
  .mode-btn{flex:1;padding:10px 14px;border:none;border-radius:9px;background:transparent;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;transition:all .15s ease;}
  .mode-btn:hover{color:var(--ink);}
  .mode-btn.emphasis{background:var(--ink);color:var(--on-ink);}

  .review-btn{width:100%;margin-top:10px;padding:14px 16px;border:1.5px solid var(--bad);border-radius:var(--radius-md);background:var(--bad-soft);color:var(--bad);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s ease;display:flex;align-items:center;justify-content:center;gap:8px;}
  .review-btn:hover{transform:translateY(-1px);}

  .best-btn{width:100%;margin-top:10px;padding:14px 16px;border:1.5px solid var(--line);border-radius:var(--radius-md);background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s ease;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);}
  .best-btn:hover{transform:translateY(-1px);}

  .lb-list{display:flex;flex-direction:column;gap:8px;}
  .lb-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius-md);box-shadow:var(--shadow);}
  .lb-rank{font-family:'JetBrains Mono',monospace;font-size:15px;width:30px;text-align:center;color:var(--ink-faint);flex-shrink:0;}
  .lb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .lb-dot.math{background:var(--math);}
  .lb-dot.sci{background:var(--sci);}
  .lb-topic{flex:1;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-time{font-family:'JetBrains Mono',monospace;font-size:14.5px;font-variant-numeric:tabular-nums;color:var(--ink);flex-shrink:0;font-weight:500;}
  .lb-row.tappable{cursor:pointer;transition:transform .12s ease, border-color .12s ease;}
  .lb-row.tappable:hover{transform:translateY(-1px);border-color:var(--ink-faint);}
  .topic-meta{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-variant-numeric:tabular-nums;color:var(--ink-faint);flex-shrink:0;}
  .section-label{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.06em;margin:18px 0 4px;}
  .section-label:first-child{margin-top:0;}

  .home-hint{font-size:13px;color:var(--ink-faint);text-align:center;margin-top:16px;line-height:1.5;}
  .home-hint a{color:var(--ink-soft);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}

  .qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;}
  .topic-tag{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;padding:5px 10px;border-radius:7px;font-weight:500;}
  .topic-tag.math{background:var(--math-soft);color:var(--math);}
  .topic-tag.sci{background:var(--sci-soft);color:var(--sci);}
  .topic-tag.review{background:var(--bad-soft);color:var(--bad);}
  .progress-label{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-faint);white-space:nowrap;}
  .qmeta-right{display:flex;align-items:center;gap:12px;}
  .timer{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums;white-space:nowrap;min-width:42px;text-align:right;}
  .speed-line{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink-soft);margin-bottom:14px;font-variant-numeric:tabular-nums;}

  .card{background:var(--surface);border-radius:var(--radius-lg);padding:30px 30px 26px;box-shadow:var(--shadow);position:relative;overflow:hidden;animation:cardIn .2s ease both;}
  @keyframes cardIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
  .card.math::before{background:var(--math);}
  .card.sci::before{background:var(--sci);}

  .qtext{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;line-height:1.5;margin:0 0 20px;letter-spacing:-0.01em;}

  .options{display:flex;flex-direction:column;gap:9px;}
  .opt{text-align:left;padding:13px 16px;border:1.5px solid var(--line);border-radius:var(--radius-md);background:var(--surface);font-family:'Inter',sans-serif;font-size:14.5px;font-weight:500;color:var(--ink);cursor:pointer;transition:all .12s ease;}
  .opt:hover:not([disabled]){border-color:var(--ink-faint);background:var(--surface-sunken);}
  .opt.correct{background:var(--good-soft);border-color:var(--good);color:var(--good);}
  .opt.wrong{background:var(--bad-soft);border-color:var(--bad);color:var(--bad);}
  .opt[disabled]{cursor:default;}

  .feedback{margin-top:16px;font-size:14px;line-height:1.65;padding:14px 16px;border-radius:var(--radius-md);background:var(--surface-sunken);color:var(--ink-soft);}

  .steps{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
  .step{font-family:'JetBrains Mono',monospace;font-size:13.5px;padding:11px 14px;border-radius:var(--radius-md);background:var(--surface-sunken);color:var(--ink);line-height:1.5;}

  .btn-row{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;}
  .btn{padding:10px 16px;border:1.5px solid var(--line);border-radius:var(--radius-md);background:var(--surface);font-size:13.5px;font-weight:500;cursor:pointer;color:var(--ink);transition:all .12s ease;font-family:'Inter',sans-serif;}
  .btn:hover{border-color:var(--ink-faint);background:var(--surface-sunken);}
  .btn.primary{background:var(--ink);color:var(--on-ink);border-color:var(--ink);}
  .btn.good{background:var(--good-soft);border-color:var(--good);color:var(--good);}
  .btn.bad{background:var(--bad-soft);border-color:var(--bad);color:var(--bad);}

  .self-mark{margin-top:16px;}
  .self-mark-label{font-size:13px;color:var(--ink-soft);margin-bottom:9px;}

  .footer-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;font-size:13px;}
  .footer-nav .back{color:var(--ink-faint);cursor:pointer;}
  .footer-nav .back:hover{color:var(--ink-soft);}
  .footer-nav .next{cursor:pointer;font-weight:600;color:var(--ink);padding:9px 16px;border-radius:var(--radius-md);background:var(--surface);box-shadow:var(--shadow);border:none;font-family:'Inter',sans-serif;font-size:13px;}
  .footer-nav .next:hover{transform:translateY(-1px);}
  .footer-nav .next[disabled]{opacity:.5;cursor:default;transform:none;}

  .empty-state{text-align:center;padding:40px 20px;}
  .empty-state h2{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;margin-bottom:8px;}
  .empty-state p{color:var(--ink-soft);font-size:14px;margin-bottom:20px;line-height:1.55;}
  .empty-state .score-big{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;margin-bottom:4px;letter-spacing:-0.02em;}

  .install-banner{display:none;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:16px;box-shadow:var(--shadow);}
  .install-banner .ib-text{flex:1;font-size:13px;color:var(--ink-soft);line-height:1.4;}
  .install-banner .ib-text b{color:var(--ink);}
  .install-banner button{flex-shrink:0;}
  .install-banner .ib-close{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;}

  /* keyboard focus ring for accessibility */
  .opt:focus-visible,.btn:focus-visible,.mode-btn:focus-visible,.next:focus-visible,.theme-toggle:focus-visible,.review-btn:focus-visible,.home-hint a:focus-visible{outline:2.5px solid var(--math);outline-offset:2px;}
  kbd{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface-sunken);color:var(--ink-soft);border:1px solid var(--line);border-radius:5px;padding:1px 5px;}

  @media (prefers-reduced-motion: reduce){
    .card{animation:none;}
    *{transition:none !important;}
  }

  @media (max-width: 430px){
    body{display:block;}   /* top-align on phones — vertical centering only helps big screens */
    #app{margin:0 auto;padding:22px 16px calc(40px + env(safe-area-inset-bottom));}
    .topbar{margin-bottom:20px;}
    .brand-tag{display:none;}          /* declutter the topbar on phones */
    .stats-row{grid-template-columns:1fr;}   /* stack the two subjects full-width */
    .stat-card{padding:16px 18px;}
    .stat-inner{gap:14px;}
    .card{padding:24px 22px 22px;}
    .qtext{font-size:18px;}
    .mode-btn{font-size:12.5px;padding:10px 6px;white-space:nowrap;}
    .kbd-tip{display:none;}   /* no physical keyboard on phones */
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const bank = {
  math: [
    {id:'m1',type:'quiz',topic:'Fractions',q:'Simplify 18/24 to its simplest form.',opts:['9/12','3/4','6/8','2/3'],correct:1,explain:'Divide the top and bottom by their greatest common factor, 6: 18÷6=3, 24÷6=4, giving 3/4.'},
    {id:'m2',type:'quiz',topic:'Decimals & fractions',q:'Which fraction is equivalent to 0.375?',opts:['1/3','3/8','5/12','3/4'],correct:1,explain:'0.375 = 375/1000, which simplifies to 3/8.'},
    {id:'m3',type:'quiz',topic:'Percentages',q:'What is 25% of 160?',opts:['25','40','45','60'],correct:1,explain:'25% means one quarter. 160 ÷ 4 = 40.'},
    {id:'m4',type:'practice',topic:'Algebra',q:'Solve for x: 2x + 5 = 17',hint:'Get x on its own — undo the +5 first, then undo the ×2.',steps:['2x + 5 = 17','Subtract 5 from both sides: 2x = 12','Divide both sides by 2: x = 6']},
    {id:'m5',type:'quiz',topic:'Negative numbers',q:'-8 + 15 = ?',opts:['-23','-7','7','23'],correct:2,explain:'Adding a positive to a negative moves you up the number line: -8 + 15 = 7.'},
    {id:'m6',type:'quiz',topic:'Negative numbers',q:'-3 × -4 = ?',opts:['-12','-7','7','12'],correct:3,explain:'A negative times a negative gives a positive: -3 × -4 = 12.'},
    {id:'m7',type:'quiz',topic:'Ratio & proportion',q:'Simplify the ratio 15:20.',opts:['3:4','5:6','1:2','4:5'],correct:0,explain:'Divide both sides by 5: 15÷5=3, 20÷5=4, giving 3:4.'},
    {id:'m8',type:'practice',topic:'Ratio & proportion',q:'A recipe serves 4 people using 300g of rice. How much rice is needed for 10 people?',hint:'Find the rice needed for 1 person first, then scale up.',steps:['300g ÷ 4 people = 75g per person','75g × 10 people = 750g','So 10 people need 750g of rice']},
    {id:'m9',type:'practice',topic:'Algebra',q:'Solve for x: 3(x - 2) = 15',hint:'Start by expanding the brackets.',steps:['3(x - 2) = 15','Expand: 3x - 6 = 15','Add 6 to both sides: 3x = 21','Divide both sides by 3: x = 7']},
    {id:'m10',type:'quiz',topic:'Geometry',q:'What is the area of a rectangle 8cm by 5cm?',opts:['13 cm²','26 cm²','40 cm²','45 cm²'],correct:2,explain:'Area of a rectangle = length × width = 8 × 5 = 40 cm².'},
    {id:'m11',type:'quiz',topic:'Geometry',q:'What is the perimeter of a square with a 9cm side?',opts:['18cm','27cm','36cm','81cm'],correct:2,explain:'A square has 4 equal sides, so perimeter = 4 × 9 = 36cm.'},
    {id:'m12',type:'practice',topic:'Geometry',q:'A triangle has angles of 55° and 65°. What is the third angle?',hint:'Remember: the angles inside any triangle always add up to the same total.',steps:['All angles in a triangle sum to 180°','55° + 65° = 120°','180° - 120° = 60°','The third angle is 60°']},
    {id:'m13',type:'quiz',topic:'Order of operations',q:'Work out: 3 + 4 × 2',opts:['14','11','10','24'],correct:1,explain:'Multiplication comes before addition (BIDMAS): 4 × 2 = 8, then 3 + 8 = 11.'},
    {id:'m14',type:'quiz',topic:'Order of operations',q:'Work out: (6 + 2) × 3²',opts:['24','72','48','30'],correct:1,explain:'Brackets first: 6 + 2 = 8. Indices next: 3² = 9. Then 8 × 9 = 72.'},
    {id:'m15',type:'quiz',topic:'Powers & roots',q:'What is 5³?',opts:['15','25','125','243'],correct:2,explain:'5³ means 5 × 5 × 5 = 125.'},
    {id:'m16',type:'quiz',topic:'Powers & roots',q:'What is √64?',opts:['6','7','8','32'],correct:2,explain:'The square root of 64 is the number that times itself gives 64: 8 × 8 = 64.'},
    {id:'m17',type:'quiz',topic:'Number properties',q:'Which of these is a prime number?',opts:['21','27','29','33'],correct:2,explain:'A prime has exactly two factors: 1 and itself. 29 has no other factors; the others are all divisible by 3.'},
    {id:'m18',type:'practice',topic:'Number properties',q:'List all the factors of 24.',hint:'Factors come in pairs that multiply to 24. Work through 1, 2, 3... and find each partner.',steps:['1 × 24','2 × 12','3 × 8','4 × 6','Factors of 24: 1, 2, 3, 4, 6, 8, 12, 24']},
    {id:'m19',type:'quiz',topic:'Averages',q:'What is the mean of 4, 8, 6, 2?',opts:['4','5','6','20'],correct:1,explain:'Mean = total ÷ how many. 4 + 8 + 6 + 2 = 20, and 20 ÷ 4 = 5.'},
    {id:'m20',type:'practice',topic:'Averages',q:'Find the median of 7, 3, 9, 5, 1.',hint:'The median is the middle value — but you have to order the numbers first.',steps:['Put them in order: 1, 3, 5, 7, 9','There are 5 values, so the middle one is the 3rd','The median is 5']},
    {id:'m21',type:'quiz',topic:'Percentages',q:'A £40 jacket is reduced by 15%. What is the new price?',opts:['£25','£34','£36','£38'],correct:1,explain:'15% of 40 = 0.15 × 40 = £6 off. 40 − 6 = £34.'},
    {id:'m22',type:'quiz',topic:'Probability',q:'A fair six-sided die is rolled. What is the probability of getting an even number?',opts:['1/6','1/3','1/2','2/3'],correct:2,explain:'The even numbers are 2, 4, 6 — that\'s 3 out of 6 outcomes, which simplifies to 1/2.'},
    {id:'m23',type:'quiz',topic:'Coordinates',q:'In which quadrant does the point (-3, 4) lie?',opts:['1st','2nd','3rd','4th'],correct:1,explain:'x is negative and y is positive — that\'s the top-left, the 2nd quadrant.'},
    {id:'m24',type:'practice',topic:'Algebra',q:'Solve for x: x/4 + 3 = 7',hint:'Undo the +3 first, then undo the ÷4.',steps:['x/4 + 3 = 7','Subtract 3 from both sides: x/4 = 4','Multiply both sides by 4: x = 16']},
    {id:'m25',type:'quiz',topic:'Fractions',q:'What is 2/3 + 1/6?',opts:['1/2','5/6','3/9','1/3'],correct:1,explain:'Rewrite 2/3 as 4/6, then 4/6 + 1/6 = 5/6.'},
    {id:'m26',type:'quiz',topic:'Decimals & fractions',q:'Write 0.6 as a fraction in its simplest form.',opts:['3/5','6/100','2/3','5/6'],correct:0,explain:'0.6 is 6/10, and dividing top and bottom by 2 gives 3/5.'},
    {id:'m27',type:'practice',topic:'Percentages',q:'Work out 30% of 90.',hint:'10% of a number is found by dividing it by 10.',steps:['Find 10% of 90: 90 ÷ 10 = 9','30% is three lots of 10%','Multiply: 9 × 3 = 27','30% of 90 = 27']},
    {id:'m28',type:'quiz',topic:'Algebra',q:'Simplify 4x + 3x - 2x.',opts:['9x','5x','x','6x'],correct:1,explain:'Add and subtract the coefficients: 4 + 3 - 2 = 5, so the answer is 5x.'},
    {id:'m29',type:'quiz',topic:'Negative numbers',q:'Calculate -5 - 7.',opts:['-2','12','-12','2'],correct:2,explain:'Subtracting 7 moves further below zero, giving -12.'},
    {id:'m30',type:'quiz',topic:'Ratio & proportion',q:'Simplify the ratio 12:18.',opts:['3:2','6:9','2:3','4:6'],correct:2,explain:'Divide both sides by their highest common factor 6 to get 2:3.'},
    {id:'m31',type:'quiz',topic:'Geometry',q:'What do the interior angles of a quadrilateral add up to?',opts:['180°','270°','360°','540°'],correct:2,explain:'A quadrilateral can be split into two triangles, and 2 × 180° = 360°.'},
    {id:'m32',type:'quiz',topic:'Order of operations',q:'Calculate 20 - 6 ÷ 2.',opts:['7','17','10','13'],correct:1,explain:'Divide first: 6 ÷ 2 = 3, then 20 - 3 = 17.'},
    {id:'m33',type:'practice',topic:'Powers & roots',q:'Evaluate 2 to the power of 4.',hint:'A power tells you how many times to multiply the base by itself.',steps:['2^4 means 2 × 2 × 2 × 2','2 × 2 = 4','4 × 2 = 8','8 × 2 = 16, so 2^4 = 16']},
    {id:'m34',type:'quiz',topic:'Number properties',q:'What is the lowest common multiple (LCM) of 4 and 6?',opts:['24','2','12','10'],correct:2,explain:'Multiples of 4 and 6 first meet at 12, so the LCM is 12.'},
    {id:'m35',type:'quiz',topic:'Averages',q:'Find the range of 3, 7, 2, 9, 5.',opts:['9','2','7','5'],correct:2,explain:'Range is largest minus smallest: 9 - 2 = 7.'},
    {id:'m36',type:'quiz',topic:'Probability',q:'A bag has 3 red and 2 blue counters. What is the probability of picking a red one?',opts:['2/5','1/2','3/5','3/2'],correct:2,explain:'There are 3 red out of 5 counters in total, so the probability is 3/5.'},
    {id:'m37',type:'quiz',topic:'Coordinates',q:'On which axis does the point (0, -5) lie?',opts:['x-axis','y-axis','origin','no axis'],correct:1,explain:'The x-coordinate is 0, so the point sits on the y-axis.'},
    {id:'m38',type:'quiz',topic:'Rounding & estimation',q:'Round 4,738 to the nearest hundred.',opts:['4,800','4,700','4,740','5,000'],correct:1,explain:'The tens digit is 3, which rounds down, keeping the hundreds as 7 for 4,700.'},
    {id:'m39',type:'practice',topic:'Sequences',q:'Find the next term: 2, 5, 8, 11, ...',hint:'Look at how much you add to get from one term to the next.',steps:['Each term goes up by 3','11 + 3 = 14','Check: 2, 5, 8, 11, 14','The next term is 14']},
    {id:'m40',type:'quiz',topic:'Area & perimeter',q:'Find the area of a triangle with base 10 cm and height 6 cm.',opts:['60 cm²','16 cm²','30 cm²','32 cm²'],correct:2,explain:'Area of a triangle is ½ × base × height = ½ × 10 × 6 = 30 cm².'},
    {id:'m41',type:'quiz',topic:'Volume',q:'What is the volume of a cube with side length 3 cm?',opts:['9 cm³','27 cm³','12 cm³','18 cm³'],correct:1,explain:'Volume of a cube is side cubed: 3 × 3 × 3 = 27 cm³.'},
    {id:'m42',type:'quiz',topic:'Angles',q:'What is the complement of a 40° angle?',opts:['60°','140°','50°','45°'],correct:2,explain:'Complementary angles add to 90°, so 90° - 40° = 50°.'},
    {id:'m43',type:'quiz',topic:'Time',q:'How many minutes are there in 2.5 hours?',opts:['120','150','90','160'],correct:1,explain:'Each hour is 60 minutes, so 2.5 × 60 = 150 minutes.'},
    {id:'m44',type:'quiz',topic:'Money',q:'What is the total cost of 3 pens at £1.25 each?',opts:['£3.75','£3.50','£4.25','£2.75'],correct:0,explain:'Multiply the price by the number: £1.25 × 3 = £3.75.'},
    {id:'m45',type:'practice',topic:'Fractions',q:'Work out 3/4 of 20.',hint:'First find one quarter, then take three of them.',steps:['One quarter of 20 is 20 ÷ 4 = 5','Three quarters is 3 × 5','3 × 5 = 15','3/4 of 20 = 15']},
    {id:'m46',type:'quiz',topic:'Decimals & fractions',q:'Which is larger, 0.7 or 3/5?',opts:['3/5','0.7','they are equal','cannot tell'],correct:1,explain:'3/5 equals 0.6, and 0.7 is greater than 0.6.'},
    {id:'m47',type:'practice',topic:'Percentages',q:'Write 45 out of 60 as a percentage.',hint:'Turn the fraction into a value out of 100.',steps:['Write it as a fraction: 45/60','Simplify to 3/4','3/4 as a decimal is 0.75','0.75 × 100 = 75%']},
    {id:'m48',type:'practice',topic:'Algebra',q:'Solve for x: 5x - 4 = 21.',hint:'Undo the operations in reverse order, starting with the -4.',steps:['Add 4 to both sides: 5x = 25','Divide both sides by 5','x = 25 ÷ 5','x = 5']},
    {id:'m49',type:'quiz',topic:'Negative numbers',q:'Calculate -20 ÷ 4.',opts:['-5','5','-4','-16'],correct:0,explain:'A negative divided by a positive is negative, so -20 ÷ 4 = -5.'},
    {id:'m50',type:'practice',topic:'Ratio & proportion',q:'A recipe uses 2 cups of flour to make 12 cookies. How much flour is needed for 30 cookies?',hint:'Find the flour needed for one cookie first, or scale the ratio up.',steps:['12 cookies need 2 cups, so 1 cookie needs 2 ÷ 12 cup','30 cookies need 30 × (2 ÷ 12)','This is 30 ÷ 6 = 5','You need 5 cups of flour']},
    {id:'m51',type:'quiz',topic:'Geometry',q:'How many lines of symmetry does a square have?',opts:['2','1','4','6'],correct:2,explain:'A square has 4 lines of symmetry: two diagonals and two through the midpoints of opposite sides.'},
    {id:'m52',type:'practice',topic:'Order of operations',q:'Evaluate 2 + 3 × (4 - 1).',hint:'Brackets first, then multiplication, then addition.',steps:['Work out the bracket: 4 - 1 = 3','Multiply: 3 × 3 = 9','Add: 2 + 9','The answer is 11']},
    {id:'m53',type:'quiz',topic:'Powers & roots',q:'What is the square root of 81?',opts:['8','9','81','18'],correct:1,explain:'9 × 9 = 81, so the square root of 81 is 9.'},
    {id:'m54',type:'quiz',topic:'Number properties',q:'What is the highest common factor (HCF) of 12 and 8?',opts:['4','2','6','8'],correct:0,explain:'The largest number that divides both 12 and 8 exactly is 4.'},
    {id:'m55',type:'quiz',topic:'Averages',q:'What is the mean of 10, 20 and 30?',opts:['15','20','30','25'],correct:1,explain:'Add them to get 60, then divide by 3 to get a mean of 20.'},
    {id:'m56',type:'practice',topic:'Probability',q:'A fair spinner is numbered 1 to 8. What is the probability of landing on a number greater than 5?',hint:'List the numbers that count as a success first.',steps:['Numbers greater than 5 are 6, 7 and 8','That is 3 successful outcomes','There are 8 numbers in total','The probability is 3/8']},
    {id:'m57',type:'quiz',topic:'Coordinates',q:'In which quadrant does the point (5, -2) lie?',opts:['first','second','third','fourth'],correct:3,explain:'A positive x and negative y place the point in the fourth quadrant.'},
    {id:'m58',type:'quiz',topic:'Rounding & estimation',q:'Round 3.276 to 2 decimal places.',opts:['3.27','3.28','3.30','3.276'],correct:1,explain:'The third decimal is 6, which rounds the 7 up, giving 3.28.'},
    {id:'m59',type:'practice',topic:'Sequences',q:'Find the 5th term of the sequence 3, 6, 12, 24, ...',hint:'See what you multiply each term by to get the next one.',steps:['Each term doubles the one before','The 4th term is 24','24 × 2 = 48','The 5th term is 48']},
    {id:'m60',type:'quiz',topic:'Area & perimeter',q:'Find the perimeter of a rectangle 7 cm long and 3 cm wide.',opts:['21 cm','20 cm','24 cm','14 cm'],correct:1,explain:'Perimeter is 2 × (length + width) = 2 × (7 + 3) = 20 cm.'},
    {id:'m61',type:'quiz',topic:'Volume',q:'What is the volume of a box measuring 2 cm by 3 cm by 4 cm?',opts:['9 cm³','24 cm³','12 cm³','18 cm³'],correct:1,explain:'Volume is length × width × height = 2 × 3 × 4 = 24 cm³.'},
    {id:'m62',type:'practice',topic:'Angles',q:'Two angles sit on a straight line. One is 110°. Find the other.',hint:'Angles on a straight line have a fixed total.',steps:['Angles on a straight line add to 180°','Subtract the known angle: 180° - 110°','This gives 70°','The other angle is 70°']},
    {id:'m63',type:'practice',topic:'Time',q:'A film starts at 19:45 and lasts 2 hours 20 minutes. What time does it end?',hint:'Add the hours first, then the minutes.',steps:['Add 2 hours to 19:45 to get 21:45','Add 20 minutes to 21:45','45 + 20 = 65 minutes, which rolls over one hour','The film ends at 22:05']},
    {id:'m64',type:'quiz',topic:'Money',q:'You pay for a £32.50 item with a £50 note. How much change do you get?',opts:['£18.50','£17.50','£22.50','£17.00'],correct:1,explain:'Subtract the cost from the note: £50 - £32.50 = £17.50.'},

    {id:'s10',type:'practice',topic:'Ecosystems',q:'Draw out (in words) the energy flow in this food chain: grass → rabbit → fox.',hint:'Think about where the energy in this chain originally comes from.',steps:['The Sun is the original energy source','Grass (producer) captures energy via photosynthesis','Rabbit (primary consumer) eats the grass','Fox (secondary consumer) eats the rabbit','Energy decreases at each step of the chain']},

    {id:'s18',type:'practice',topic:'Acids & bases',q:'What colour does universal indicator turn in a neutral solution, and what pH is that?',hint:'Neutral sits right in the middle of the pH scale.',steps:['The pH scale runs from 0 to 14','Neutral is exactly in the middle: pH 7','Pure water is neutral','Universal indicator turns green at pH 7']},
    {id:'s19',type:'quiz',topic:'Energy',q:'A moving object has which type of energy?',opts:['Thermal','Kinetic','Chemical','Nuclear'],correct:1,explain:'Kinetic energy is the energy of movement. The faster or heavier an object, the more kinetic energy it has.'},
    {id:'s20',type:'quiz',topic:'Energy',q:'Energy cannot be created or destroyed, only...',opts:['Increased','Transferred','Removed','Weighed'],correct:1,explain:'This is the law of conservation of energy: energy is transferred from one store to another, never made or lost.'},
    {id:'s21',type:'quiz',topic:'Light & sound',q:'Which travels faster?',opts:['Sound','Light','They are equal','Neither moves'],correct:1,explain:'Light travels far faster than sound — that\'s why you see lightning before you hear thunder.'},
    {id:'s22',type:'quiz',topic:'Periodic table',q:'What is the chemical symbol for Oxygen?',opts:['O','Ox','Og','Om'],correct:0,explain:'Oxygen\'s symbol is simply O. Symbols are one or two letters, with only the first capitalised.'},
    {id:'s23',type:'quiz',topic:'Electricity',q:'In a series circuit, if one bulb breaks, the others will...',opts:['Get brighter','Stay the same','Go out','Flash'],correct:2,explain:'A series circuit is a single loop, so a break anywhere stops the current — all the bulbs go out.'},
    {id:'s24',type:'practice',topic:'Cells',q:'Name three parts a plant cell has that an animal cell does NOT.',hint:'Think about what a plant needs that an animal doesn\'t — support, food-making, and storage.',steps:['Cell wall — gives the plant cell support and shape','Chloroplasts — contain chlorophyll to carry out photosynthesis','Large permanent vacuole — stores cell sap and keeps the cell firm','Animal cells have none of these three']},

    {id:'s26',type:'quiz',topic:'States of matter',q:'What is the change of state from a solid to a liquid called?',opts:['freezing','melting','boiling','condensing'],correct:1,explain:'When a solid gains heat and turns into a liquid, it is melting.'},
    {id:'s27',type:'quiz',topic:'Forces',q:'Which force slows down a book sliding across a table?',opts:['gravity','magnetism','friction','tension'],correct:2,explain:'Friction acts between surfaces to oppose motion and slows the book down.'},
    {id:'s28',type:'practice',topic:'Scientific method',q:'A student tests how the amount of fertiliser affects plant height. Identify the independent variable.',hint:'The independent variable is the one the experimenter deliberately changes.',steps:['Decide what is being deliberately changed','Here it is the amount of fertiliser given','Plant height is measured, so it is the dependent variable','The independent variable is the amount of fertiliser']},
    {id:'s29',type:'quiz',topic:'Ecosystems',q:'What name is given to animals that eat only plants?',opts:['carnivores','omnivores','herbivores','decomposers'],correct:2,explain:'Herbivores are animals whose diet consists only of plants.'},
    {id:'s30',type:'quiz',topic:'Photosynthesis',q:'Which sugar do plants make during photosynthesis?',opts:['oxygen','glucose','carbon dioxide','water'],correct:1,explain:'Photosynthesis produces glucose, which the plant uses for energy and growth.'},
    {id:'s31',type:'practice',topic:'Human body',q:'How many bones are in a typical adult human skeleton?',hint:'Babies are born with more, and some fuse together as we grow.',steps:['A newborn has around 300 bones','As a person grows, many bones fuse together','This leaves a fixed number in adulthood','An adult human skeleton has 206 bones']},
    {id:'s32',type:'quiz',topic:'Acids & bases',q:'A solution with a pH of 12 is best described as:',opts:['strongly acidic','neutral','strongly alkaline','slightly acidic'],correct:2,explain:'A pH well above 7, like 12, means the solution is strongly alkaline (basic).'},
    {id:'s33',type:'quiz',topic:'Energy',q:'What type of energy is stored in food?',opts:['kinetic energy','chemical energy','light energy','sound energy'],correct:1,explain:'Food stores chemical energy, which the body releases during respiration.'},
    {id:'s34',type:'quiz',topic:'Light & sound',q:'What is it called when light bounces off a surface?',opts:['refraction','absorption','reflection','diffraction'],correct:2,explain:'Reflection is when light rays bounce off a surface such as a mirror.'},

    {id:'s49',type:'practice',topic:'Photosynthesis',q:'A leaf is tested with iodine and turns blue-black. What does this tell you?',hint:'Iodine is used as a test for one particular food substance.',steps:['Iodine solution is a test for starch','It stays orange-brown if no starch is present','It turns blue-black when starch is present','The leaf has been making and storing starch']},

    {id:'s53',type:'practice',topic:'Energy',q:'A ball is held high in the air. Name its stored energy and what it changes into when dropped.',hint:'Think about position first, then movement.',steps:['Held up high, the ball stores gravitational potential energy','When released, it starts to fall and speed up','The stored energy is transferred as it moves','It becomes kinetic energy (energy of movement)']},

  bestTimes: {}       // { [topic]: { t:seconds, subj:'math'|'science' } } — fastest correct answer
};

/* ---------- theme ---------- */
function systemDark(){ return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
function effectiveTheme(){
  const explicit = document.documentElement.getAttribute('data-theme');
  if(explicit) return explicit;
  return systemDark() ? 'dark' : 'light';
}
function applyThemeMeta(){
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', effectiveTheme()==='dark' ? '#0E1014' : '#F4F5F8');
}
function toggleTheme(){
  const next = effectiveTheme()==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('sharpen.theme', next); }catch(e){}
  applyThemeMeta();
  render();   // refresh the toggle icon
}

/* ---------- persistence ---------- */
function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dayDiff(a, b){
  // whole days between YYYY-MM-DD strings a (earlier) and b (later)
  const da = new Date(a+'T00:00:00'), db = new Date(b+'T00:00:00');
  return Math.round((db - da) / 86400000);
}
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(saved.scores) state.scores = saved.scores;
    if(saved.wrong) state.wrong = saved.wrong;
    if(saved.streak) state.streak = saved.streak;
    if(saved.bestTimes) state.bestTimes = saved.bestTimes;
  }catch(e){ /* corrupt or blocked storage — start fresh */ }
}
function save(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      scores: state.scores, wrong: state.wrong, streak: state.streak, bestTimes: state.bestTimes
    }));
  }catch(e){ /* storage full or blocked — app still works this session */ }
}
function touchStreak(){
  const t = todayKey();
  const s = state.streak;
  if(s.lastDay === t) return;           // already counted today
  if(s.lastDay && dayDiff(s.lastDay, t) === 1) s.count += 1;  // consecutive day
  else s.count = 1;                      // first ever, or a gap → restart at 1
  s.lastDay = t;
}
function recordResult(subj, qid, wasCorrect){
  state.scores[subj].attempted++;
  if(wasCorrect){
    state.scores[subj].correct++;
    if(state.wrong[qid]) delete state.wrong[qid];   // mastered — clear from review
  } else {
    state.wrong[qid] = true;                         // add to review set
  }
  touchStreak();
  save();
}
function recordBest(topic, subj, secs){
  // only correct answers set a best time; keep the fastest per topic
  const prev = state.bestTimes[topic];
  if(!prev || secs < prev.t){
    state.bestTimes[topic] = { t: secs, subj: subj };
    save();
  }
}
function wrongList(){
  const all = bank.math.concat(bank.science);
  return all.filter(q => state.wrong[q.id]);
}

/* ---------- helpers ---------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pct(subj){
  const s = state.scores[subj];
  if(s.attempted===0) return 0;
  return s.correct/s.attempted;
}
function subjectOf(q){ return bank.math.includes(q) ? 'math' : 'science'; }

function ring(p, color){
  const r = 20, c = 2*Math.PI*r;
  const offset = c - p*c;
  return `<svg width="52" height="52" viewBox="0 0 52 52" style="flex-shrink:0;transform:rotate(-90deg)">
    <circle cx="26" cy="26" r="${r}" fill="none" stroke="var(--surface-sunken)" stroke-width="5"/>
    <circle cx="26" cy="26" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

/* ---------- render ---------- */
function fmtTime(ms){ return (ms/1000).toFixed(1) + 's'; }

function render(){
  clearInterval(state.timerId);   // stop any live timer; renderQuestion restarts it if needed
  const app = document.getElementById('app');
  if(state.mode === 'leaderboard'){
    renderLeaderboard(app);
  } else if(state.mode === 'topics'){
    renderTopics(app);
  } else if(!state.mode){
    renderHome(app);
  } else {
    renderQuestion(app);
  }
}

function renderHome(app){
  const mpct = pct('math'), spct = pct('science');
  const reviewCount = wrongList().length;
  const streakActive = state.streak.lastDay === todayKey();
  const streakLabel = state.streak.count > 0
    ? `${state.streak.count}-day streak`
    : 'Start a streak';

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-name">Sharpen</div>
          <div class="brand-tag">MYP Grade 7 · Math &amp; Science</div>
        </div>
      </div>
      <div class="top-right">
        <div class="streak-chip ${streakActive?'':'cold'}">
          <span class="flame">${streakActive?'🔥':'❄️'}</span>${streakLabel}
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">${effectiveTheme()==='dark'?'☀️':'🌙'}</button>
      </div>
    </div>
    <div id="install-banner" class="install-banner">
      <div class="ib-text"><b>Install Sharpen</b> — add it to your home screen to study offline, like a real app.</div>
      <button class="btn primary" id="install-btn">Install</button>
      <button class="ib-close" id="install-dismiss" aria-label="Dismiss">×</button>
    </div>
    <div class="stats-row">
      <div class="stat-card ${state.subject==='math'?'active math':''}" id="pick-math">
        <div class="stat-inner">
          ${ring(mpct,'var(--math)')}
          <div class="stat-text">
            <div class="stat-label">Math</div>
            <div class="stat-value"><b>${state.scores.math.correct}</b>/${state.scores.math.attempted} correct</div>
            <div class="stat-sub">${Math.round(mpct*100)}% accuracy</div>
          </div>
        </div>
      </div>
      <div class="stat-card ${state.subject==='science'?'active sci':''}" id="pick-science">
        <div class="stat-inner">
          ${ring(spct,'var(--sci)')}
          <div class="stat-text">
            <div class="stat-label">Science</div>
            <div class="stat-value"><b>${state.scores.science.correct}</b>/${state.scores.science.attempted} correct</div>
            <div class="stat-sub">${Math.round(spct*100)}% accuracy</div>
          </div>
        </div>
      </div>
    </div>
    <div class="mode-row">
      <button class="mode-btn ${!state.subject?'emphasis':''}" id="pick-mixed">Mixed</button>
      <button class="mode-btn" id="start-quiz">Quiz mode</button>
      <button class="mode-btn" id="start-practice">Practice mode</button>
    </div>
    ${reviewCount>0 ? `<button class="review-btn" id="start-review">↻ Review my mistakes · ${reviewCount} question${reviewCount>1?'s':''}</button>` : ''}
    <button class="best-btn" id="drill-topic">📚 Practice one topic</button>
    <button class="best-btn" id="best-times">🏆 Best times per topic${Object.keys(state.bestTimes).length ? ` · ${Object.keys(state.bestTimes).length}` : ''}</button>
    <div class="home-hint">
      Select a subject above (or leave on Mixed), then choose quiz or practice.
      <span class="kbd-tip"><br>Tip: press <kbd>1</kbd>–<kbd>4</kbd> to answer, <kbd>→</kbd> for next.</span><br>
      <a id="reset-link">Reset all progress</a>
    </div>
  `;
  document.getElementById('pick-math').onclick = ()=>{ state.subject = state.subject==='math' ? null : 'math'; render(); };
  document.getElementById('pick-science').onclick = ()=>{ state.subject = state.subject==='science' ? null : 'science'; render(); };
  document.getElementById('pick-mixed').onclick = ()=>{ state.subject = null; render(); };
  document.getElementById('start-quiz').onclick = ()=> startSession('quiz');
  document.getElementById('start-practice').onclick = ()=> startSession('practice');
  document.getElementById('theme-toggle').onclick = toggleTheme;
  const rev = document.getElementById('start-review');
  if(rev) rev.onclick = ()=> startReview();
  document.getElementById('best-times').onclick = ()=>{ state.mode = 'leaderboard'; render(); };
  document.getElementById('drill-topic').onclick = ()=>{ state.mode = 'topics'; render(); };
  document.getElementById('reset-link').onclick = ()=>{
    if(confirm('Reset all scores, streak, saved mistakes, and best times? This cannot be undone.')){
      state.scores = { math:{correct:0,attempted:0}, science:{correct:0,attempted:0} };
      state.wrong = {};
      state.streak = { count:0, lastDay:null };
      state.bestTimes = {};
      save();
      render();
    }
  };
  wireInstall();
}

function renderLeaderboard(app){
  // entries sorted fastest-first
  const entries = Object.keys(state.bestTimes)
    .map(topic => ({ topic, t: state.bestTimes[topic].t, subj: state.bestTimes[topic].subj }))
    .sort((a,b) => a.t - b.t);
  const medals = ['🥇','🥈','🥉'];

  let body;
  if(entries.length === 0){
    body = `<div class="empty-state">
        <h2>No times yet</h2>
        <p>Answer questions correctly and your fastest time for each topic shows up here. Race yourself!</p>
        <button class="btn primary" id="lb-back">Back to dashboard</button>
      </div>`;
  } else {
    body = `<div class="lb-list">` + entries.map((e,i)=>`
        <div class="lb-row tappable" title="Practice this topic">
          <span class="lb-rank">${i<3 ? medals[i] : '#'+(i+1)}</span>
          <span class="lb-dot ${e.subj==='math'?'math':'sci'}"></span>
          <span class="lb-topic">${e.topic}</span>
          <span class="lb-time">${e.t.toFixed(1)}s</span>
        </div>`).join('') + `</div>
      <div class="footer-nav" style="margin-top:20px;">
        <span class="back" id="lb-back">← Dashboard</span>
        <span class="progress-label">tap a topic to beat it</span>
      </div>`;
  }

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-name">Sharpen</div>
          <div class="brand-tag">🏆 Best times per topic</div>
        </div>
      </div>
    </div>
    ${entries.length ? body : `<div class="card" style="border-left:none;">${body}</div>`}
  `;
  document.getElementById('lb-back').onclick = ()=>{ state.mode = null; render(); };
  app.querySelectorAll('.lb-row.tappable').forEach(row=>{
    row.onclick = ()=> startTopic(row.querySelector('.lb-topic').textContent);
  });
}

function topicCounts(){
  const out = { math:{}, science:{} };
  bank.math.forEach(q=>{ out.math[q.topic] = (out.math[q.topic]||0)+1; });
  bank.science.forEach(q=>{ out.science[q.topic] = (out.science[q.topic]||0)+1; });
  return out;
}

function renderTopics(app){
  const counts = topicCounts();
  const section = (subj, label, dotClass)=>{
    const topics = Object.keys(counts[subj]).sort();
    if(!topics.length) return '';
    return `<div class="section-label">${label}</div>` + topics.map(topic=>{
      const best = state.bestTimes[topic];
      return `<div class="lb-row tappable" title="Practice ${topic}">
          <span class="lb-dot ${dotClass}"></span>
          <span class="lb-topic">${topic}</span>
          <span class="topic-meta">${best ? best.t.toFixed(1)+'s · ' : ''}${counts[subj][topic]} Q</span>
        </div>`;
    }).join('');
  };
  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-name">Sharpen</div>
          <div class="brand-tag">📚 Practice one topic</div>
        </div>
      </div>
    </div>
    <div class="lb-list">
      ${section('math','Math','math')}
      ${section('science','Science','sci')}
    </div>
    <div class="footer-nav" style="margin-top:20px;">
      <span class="back" id="tp-back">← Dashboard</span>
      <span class="progress-label">tap a topic to drill it</span>
    </div>
  `;
  document.getElementById('tp-back').onclick = ()=>{ state.mode = null; render(); };
  app.querySelectorAll('.lb-row.tappable').forEach(row=>{
    row.onclick = ()=> startTopic(row.querySelector('.lb-topic').textContent);
  });
}

function startTopic(topic){
  const pool = bank.math.concat(bank.science).filter(q=>q.topic===topic);
  if(!pool.length) return;
  beginQueue(shuffle(pool), 'topic');
}

function startSession(mode){
  let pool = [];
  if(state.subject==='math') pool = bank.math;
  else if(state.subject==='science') pool = bank.science;
  else pool = bank.math.concat(bank.science);
  pool = pool.filter(q=>q.type===mode);
  beginQueue(shuffle(pool), mode);
}
function startReview(){
  const pool = wrongList();
  if(pool.length===0) return;
  beginQueue(shuffle(pool), 'review');
}
function beginQueue(queue, mode){
  state.queue = queue;
  state.mode = mode;
  state.index = 0;
  state.answered = false;
  state.chosen = null;
  state.orderFor = -1;
  state.times = [];
  state.timedFor = -1;
  state.qElapsed = null;
  state.hintShown = false;
  state.stepReveal = 0;
  state.selfMarked = false;
  render();
}

function currentQ(){ return state.queue[state.index]; }

function renderQuestion(app){
  const q = currentQ();
  if(!q){ renderSessionEnd(app); return; }

  // shuffle option order once per question so you can't memorise a position
  if(q.type==='quiz' && state.orderFor !== state.index){
    state.order = shuffle(q.opts.map((_,i)=>i));
    state.orderFor = state.index;
  }

  // start the stopwatch once per question
  if(state.timedFor !== state.index){
    state.qStart = performance.now();
    state.qElapsed = null;
    state.timedFor = state.index;
  }

  const subj = subjectOf(q);
  const tagClass = subj==='math' ? 'math' : 'sci';
  const isReview = state.mode==='review';
  const modeTag = isReview ? 'review' : tagClass;
  const modeLabel = state.mode==='quiz' ? 'Quiz mode' : state.mode==='review' ? 'Review mode' : state.mode==='topic' ? `Topic: ${q.topic}` : 'Practice mode';

  let inner = `<div class="qtext">${q.q}</div>`;

  if(q.type==='quiz'){
    inner += `<div class="options">` + state.order.map((oi)=>{
      let cls = 'opt';
      if(state.answered){
        if(oi===q.correct) cls += ' correct';
        else if(oi===state.chosen) cls += ' wrong';
      }
      return `<button class="${cls}" data-i="${oi}" ${state.answered?'disabled':''}>${q.opts[oi]}</button>`;
    }).join('') + `</div>`;
    if(state.answered){
      inner += `<div class="feedback">${q.explain}</div>`;
    }
  } else {
    inner += `<div class="btn-row">
        <button class="btn" id="show-hint">Show hint</button>
        <button class="btn" id="show-step">Reveal next step</button>
      </div>`;
    if(state.hintShown){
      inner += `<div class="feedback">${q.hint}</div>`;
    }
    if(state.stepReveal>0){
      inner += `<div class="steps">` + q.steps.slice(0,state.stepReveal).map(s=>`<div class="step">${s}</div>`).join('') + `</div>`;
    }
    // self-mark is always available — work it out in your head, use hint/steps only if stuck
    if(!state.selfMarked){
      inner += `<div class="self-mark">
          <div class="self-mark-label">Work out the answer, then mark yourself honestly:</div>
          <div class="btn-row">
            <button class="btn good" id="mark-right">✓ I got it</button>
            <button class="btn bad" id="mark-wrong">✕ Need more practice</button>
          </div>
        </div>`;
    }
    if(state.selfMarked){
      inner += `<div class="feedback">${state.lastMarkRight ? 'Nice — logged as mastered.' : 'No worries — saved to your review list so you can come back to it.'}</div>`;
    }
  }

  const nextEnabled = q.type==='quiz' ? state.answered : state.selfMarked;

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-name">Sharpen</div>
          <div class="brand-tag">${modeLabel}</div>
        </div>
      </div>
    </div>
    <div class="qmeta">
      <span class="topic-tag ${modeTag}">${subj} · ${q.topic}</span>
      <span class="qmeta-right">
        <span class="timer" id="timer">0.0s</span>
        <span class="progress-label">${String(state.index+1).padStart(2,'0')} / ${String(state.queue.length).padStart(2,'0')}</span>
      </span>
    </div>
    <div class="card ${tagClass}">${inner}</div>
    <div class="footer-nav">
      <span class="back" id="back-home-link">← Dashboard</span>
      <button class="next" id="next-btn" ${nextEnabled?'':'disabled'}>${state.index+1 < state.queue.length ? 'Next question →' : 'Finish session →'}</button>
    </div>
  `;

  document.getElementById('back-home-link').onclick = ()=>{ state.mode=null; render(); };
  document.getElementById('next-btn').onclick = ()=>{
    if(!nextEnabled) return;
    state.index++;
    state.answered = false;
    state.chosen = null;
    state.hintShown = false;
    state.stepReveal = 0;
    state.selfMarked = false;
    render();
  };

  if(q.type==='quiz'){
    if(!state.answered){
      document.querySelectorAll('.opt').forEach(btn=>{
        btn.onclick = ()=>{
          if(state.answered) return;
          const i = parseInt(btn.dataset.i);
          state.answered = true;
          state.chosen = i;
          stopTimer();
          if(i===q.correct) recordBest(q.topic, subj, state.qElapsed/1000);
          recordResult(subj, q.id, i===q.correct);
          render();   // re-render: colours the options + shows explanation + enables Next
        };
      });
    }
  } else {
    const hintBtn = document.getElementById('show-hint');
    if(hintBtn) hintBtn.onclick = ()=>{ state.hintShown = true; render(); };
    const stepBtn = document.getElementById('show-step');
    if(stepBtn) stepBtn.onclick = ()=>{
      if(state.stepReveal < q.steps.length){ state.stepReveal++; render(); }
    };
    const right = document.getElementById('mark-right');
    if(right) right.onclick = ()=>{
      state.selfMarked = true; state.lastMarkRight = true;
      stopTimer();
      recordBest(q.topic, subj, state.qElapsed/1000);
      recordResult(subj, q.id, true);
      render();
    };
    const wrong = document.getElementById('mark-wrong');
    if(wrong) wrong.onclick = ()=>{
      state.selfMarked = true; state.lastMarkRight = false;
      stopTimer();
      recordResult(subj, q.id, false);
      render();
    };
  }

  // stopwatch: freeze when done, otherwise tick live
  const isDone = q.type==='quiz' ? state.answered : state.selfMarked;
  const timerEl = document.getElementById('timer');
  if(timerEl){
    if(isDone){
      timerEl.textContent = fmtTime(state.qElapsed != null ? state.qElapsed : (performance.now() - state.qStart));
    } else {
      const tick = ()=>{ const el = document.getElementById('timer'); if(el) el.textContent = fmtTime(performance.now() - state.qStart); };
      tick();
      state.timerId = setInterval(tick, 100);
    }
  }
}

function stopTimer(){
  clearInterval(state.timerId);
  if(state.qElapsed == null){
    state.qElapsed = performance.now() - state.qStart;
    state.times.push(state.qElapsed / 1000);
  }
}

function renderSessionEnd(app){
  const done = state.queue.length;
  const isReview = state.mode==='review';
  const t = state.times;
  const speed = t.length
    ? `⏱ ${(t.reduce((a,b)=>a+b,0)/t.length).toFixed(1)}s average · fastest ${Math.min(...t).toFixed(1)}s`
    : '';
  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-name">Sharpen</div>
          <div class="brand-tag">Session complete</div>
        </div>
      </div>
    </div>
    <div class="card" style="border-left:none;">
      <div class="empty-state">
        <div class="score-big">${done} done</div>
        <h2>${isReview ? 'Mistakes reviewed' : 'Nice work'}</h2>
        ${speed ? `<div class="speed-line">${speed}</div>` : ''}
        <p>${isReview
          ? 'Anything you got right just now cleared out of your review list. What\'s left still needs another pass.'
          : 'Your progress and streak are saved. Come back tomorrow to keep the streak alive.'}</p>
        <button class="btn primary" id="back-home">Back to dashboard</button>
      </div>
    </div>`;
  document.getElementById('back-home').onclick = ()=>{ state.mode=null; render(); };
}

/* ---------- PWA install prompt ---------- */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  const b = document.getElementById('install-banner');
  if(b && localStorage.getItem('sharpen.installDismissed')!=='1') b.style.display='flex';
});
function wireInstall(){
  const banner = document.getElementById('install-banner');
  if(!banner) return;
  if(deferredPrompt && localStorage.getItem('sharpen.installDismissed')!=='1') banner.style.display='flex';
  const btn = document.getElementById('install-btn');
  if(btn) btn.onclick = async ()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.style.display='none';
  };
  const dismiss = document.getElementById('install-dismiss');
  if(dismiss) dismiss.onclick = ()=>{
    banner.style.display='none';
    try{ localStorage.setItem('sharpen.installDismissed','1'); }catch(e){}
  };
}

/* ---------- keyboard shortcuts ---------- */
// Bound once. During a session: 1–4 answer a quiz, Enter/→ advance, Esc → dashboard.
document.addEventListener('keydown', (e)=>{
  if(e.repeat || e.metaKey || e.ctrlKey || e.altKey) return;
  if(!state.mode) return;
  const q = currentQ();
  if(!q){ // session-complete screen
    if(e.key==='Enter'){ const b=document.getElementById('back-home'); if(b){ b.click(); e.preventDefault(); } }
    return;
  }
  if(e.key==='Escape'){ state.mode=null; render(); return; }
  // answer a quiz with number keys
  if(q.type==='quiz' && !state.answered && /^[1-9]$/.test(e.key)){
    const i = parseInt(e.key)-1;
    const btns = document.querySelectorAll('.opt');   // select by displayed position
    if(i < btns.length){ btns[i].click(); e.preventDefault(); }
    return;
  }
  // advance (don't hijack Enter when a button is focused — let it click that)
  if((e.key==='ArrowRight') || (e.key==='Enter' && !(e.target && e.target.tagName==='BUTTON'))){
    const nb=document.getElementById('next-btn');
    if(nb && !nb.disabled){ nb.click(); e.preventDefault(); }
  }
});

/* ---------- boot ---------- */
load();
applyThemeMeta();
render();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
